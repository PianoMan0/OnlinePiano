<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Multiplayer Piano</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    .key { 
      padding: 20px; 
      margin: 5px; 
      display: inline-block; 
      background: #eee; 
      cursor: pointer; 
      border-radius: 6px;
      width: 60px;
    }
    .active { background: #ccc; }
  </style>
</head>
<body>

  <h1>Multiplayer Piano</h1>

  <input id="room" placeholder="room name" />
  <button onclick="joinRoom()">Join Room</button>

  <h3 id="status">Not connected</h3>

  <div id="piano"></div>

  <script>
    const notes = {
      C4: 261.63,
      D4: 293.66,
      E4: 329.63,
      F4: 349.23,
      G4: 392.00,
      A4: 440.00,
      B4: 493.88
    };

    let ws = null;

    function playNote(freq) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.frequency.value = freq;
      osc.type = "sine";

      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.4, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.6);
    }

    function flash(note) {
      const el = document.getElementById(note);
      el.classList.add("active");
      setTimeout(() => el.classList.remove("active"), 150);
    }

    function joinRoom() {
      const room = document.getElementById("room").value || "default";

      if (ws) ws.close();

      ws = new WebSocket(`wss://${location.host}/ws?room=${room}`);

      ws.onopen = () => {
        document.getElementById("status").textContent = "Connected to room: " + room;
      };

      ws.onmessage = (msg) => {
        const note = msg.data;
        playNote(notes[note]);
        flash(note);
      };

      ws.onclose = () => {
        document.getElementById("status").textContent = "Disconnected";
      };
    }

    // Build piano UI
    const piano = document.getElementById("piano");
    Object.keys(notes).forEach(note => {
      const key = document.createElement("div");
      key.className = "key";
      key.id = note;
      key.textContent = note;

      key.onclick = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(note);
        playNote(notes[note]);
        flash(note);
      };

      piano.appendChild(key);
    });
  </script>

</body>
</html>
